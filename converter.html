<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFKIND - Data Converter</title>
    <style>
        :root { --primary:#0b3d91; --accent:#25D366; --bg:#f4f7fa; --blue:#3b82f6; --orange:#f97316; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .converter-card {
            max-width: 700px; margin: 20px auto; background: #fff;
            padding: 30px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* INSTRUCTION NOTE STYLE */
        .instruction-note {
            background: #fff7ed;
            border-left: 5px solid var(--orange);
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
            color: #9a3412;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        
        textarea {
            width: 100%; padding: 15px; border: 1.5px solid #ddd;
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
            font-family: monospace; background: #fafafa;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }

        .btn {
            flex: 1; padding: 15px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.3s; color: white;
        }

        .btn-convert { background: var(--blue); }
        .btn-copy { background: var(--accent); }
        .btn-clear { background: #ef4444; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .preview-area {
            margin-top: 25px; padding: 15px; background: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 10px;
        }
        
        .preview-header { font-weight: bold; color: #64748b; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f1f5f9; color: var(--primary); }

        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #64748b; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>📊 Data to Excel Converter</h2>

    <div class="instruction-note">
        <strong>📝 Note:</strong> WhatsApp se data copy karke yahan paste karein, fir <b>Convert</b> button dabayein. Formatting ke baad data copy karein aur apne <b>Dashboard Google Sheet</b> mein paste karke save karein.
    </div>
    
    <div class="input-group">
        <label>Raw Data Paste Karein (Name Number):</label>
        <textarea id="rawData" rows="10" placeholder="Shivam Yadav 9555696023&#10;Dhiraj kumar 9661129162"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-convert" onclick="convertToExcel()">🔄 Convert Data</button>
        <button id="copyBtn" class="btn btn-copy" style="display:none;" onclick="copyToClipboard()">📋 Copy for Google Sheet</button>
        <button class="btn btn-clear" onclick="clearAll()">🗑️ Clear</button>
    </div>

    <div id="previewSection" style="display:none;">
        <div class="preview-area">
            <div class="preview-header">Live Preview (Ready to Paste)</div>
            <div id="tableDisplay"></div>
        </div>
    </div>

    <div class="back-link">
        <a href="javascript:history.back()">← Back to Dashboard</a>
    </div>
</div>

<script>
    let formattedText = "";

    function convertToExcel() {
        const input = document.getElementById('rawData').value.trim();
        if (!input) {
            alert("Kripya pehle data paste karein!");
            return;
        }

        const lines = input.split('\n');
        let html = "<table><tr><th>Name</th><th>Mobile Number</th></tr>";
        formattedText = ""; 

        lines.forEach(line => {
            const match = line.match(/(.*?)\s*(\d{10})$/);
            if (match) {
                const name = match[1].trim();
                const phone = match[2].trim();
                formattedText += `${name}\t${phone}\n`;
                html += `<tr><td>${name}</td><td>${phone}</td></tr>`;
            }
        });

        if (formattedText === "") {
            alert("Data format sahi nahi hai. Har line ke baad 10 digit ka number hona chahiye.");
            return;
        }

        document.getElementById('tableDisplay').innerHTML = html + "</table>";
        document.getElementById('previewSection').style.display = "block";
        document.getElementById('copyBtn').style.display = "flex";
    }

    function copyToClipboard() {
        if (!formattedText) return;
        navigator.clipboard.writeText(formattedText).then(() => {
            alert("✅ Data Copy ho gaya! Ab Google Sheet mein jaakar Paste (Ctrl+V) karein.");
        });
    }

    function clearAll() {
        document.getElementById('rawData').value = "";
        document.getElementById('previewSection').style.display = "none";
        document.getElementById('copyBtn').style.display = "none";
        formattedText = "";
    }
</script>

</body>
</html>
