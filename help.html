<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAFKIND Training Center</title>

<style>
:root { --primary:#0b3d91; --bg:#f0f4f8; }

body { margin:0; font-family:Arial; background:var(--bg); }

.header{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:15px;
}

.container{max-width:1100px;margin:auto;padding:10px;}

.sidebar{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
}

.nav-btn{
  padding:10px 18px;
  border-radius:30px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  white-space:nowrap;
}

.nav-btn.active{
  background:var(--primary);
  color:#fff;
}

/* TICKER */
.ticker{
  background:#fff7cc;
  padding:8px;
  font-size:13px;
  border-radius:6px;
  margin-bottom:10px;
  overflow:hidden;
  white-space:nowrap;
}

.ticker span{
  display:inline-block;
  animation:scroll 14s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

/* CARD */
.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  display:none;
}

.card.active{display:block;}

.card-header{
  padding:10px;
  border-bottom:1px solid #eee;
  font-weight:bold;
  color:var(--primary);
}

/* VIEWER */
.viewer{
  height:75vh;
  background:#333;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* LINK */
.fallback{
  text-align:center;
  padding:8px;
  background:#fff3cd;
}

.fallback a{color:#b45309;font-weight:bold;}

@media(max-width:600px){
  .viewer{height:60vh;}
}
</style>
</head>

<body>

<div class="header">
<h2>STAFKIND TRAINING PORTAL</h2>
<p style="margin:0;opacity:0.8;font-size:13px;">KYC Training System (Step-by-Step Guide)</p>
</div>

<div class="container">

<!-- BUTTONS -->
<div class="sidebar">
<button class="nav-btn active" onclick="show('mstock',this)">mStock</button>
<button class="nav-btn" onclick="show('angel',this)">Angel One</button>
<button class="nav-btn" onclick="show('upstox',this)">Upstox</button>
<button class="nav-btn" onclick="show('tide',this)">Tide</button>
</div>

<!-- TICKER -->
<div class="ticker"><span id="textGuide">Select Application to see KYC guide...</span></div>

<!-- mStock -->
<div id="mstock" class="card active">
<div class="card-header">mStock KYC Guide</div>

<div class="fallback">
<a href="https://drive.google.com/file/d/1B1G7MsYB2M5De8RXenWLDmSMHoCbhkn4/view" target="_blank">Open PDF</a>
</div>

<div class="viewer">
<iframe loading="lazy"
src="https://drive.google.com/file/d/1B1G7MsYB2M5De8RXenWLDmSMHoCbhkn4/preview"></iframe>
</div>
</div>

<!-- ANGEL -->
<div id="angel" class="card">
<div class="card-header">Angel One KYC Guide</div>

<div class="fallback">
<a href="https://drive.google.com/file/d/1xRVPrK87fORyGbgJ32du8Rzl5f7wWbsv/view" target="_blank">Open PDF</a>
</div>

<div class="viewer">
<iframe loading="lazy"
src="https://drive.google.com/file/d/1xRVPrK87fORyGbgJ32du8Rzl5f7wWbsv/preview"></iframe>
</div>
</div>

<!-- UPSTOX -->
<div id="upstox" class="card">
<div class="card-header">Upstox KYC Guide</div>

<div class="fallback">
<a href="https://drive.google.com/file/d/1qnCqglbq3XYi1A76AiHW0v76XJ7QPMeS/view" target="_blank">Open PDF</a>
</div>

<div class="viewer">
<iframe loading="lazy"
src="https://drive.google.com/file/d/1qnCqglbq3XYi1A76AiHW0v76XJ7QPMeS/preview"></iframe>
</div>
</div>

<!-- TIDE -->
<div id="tide" class="card">
<div class="card-header">Tide KYC Guide</div>

<div class="fallback">
<a href="https://drive.google.com/file/d/1tvMVv9XxbrQU1egYWCzhMkYw1et7ZYKT/view?usp=sharing" target="_blank">Open PDF</a>
</div>

<div class="viewer">
<iframe loading="lazy"
src="https://drive.google.com/file/d/1tvMVv9XxbrQU1egYWCzhMkYw1et7ZYKT/preview"></iframe>
</div>
</div>

</div>

<script>

const guides = {
mstock: "mStock KYC: PAN, Aadhaar OTP verification, bank linking, DigiLocker verification आवश्यक है।",
angel: "Angel One KYC: PAN, Aadhaar upload, OTP verification, e-sign process पूरा करना जरूरी है।",
upstox: "Upstox KYC: PAN verification, Aadhaar OTP, bank linking और video/self verification जरूरी है।",
tide: "Tide KYC: Mobile verification, identity proof upload, business details और full verification process पूरा करें।"
};

function show(id,btn){

document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

document.getElementById(id).classList.add('active');
btn.classList.add('active');

document.getElementById("textGuide").innerText = guides[id];
}

</script>

</body>
</html>
