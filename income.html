<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sainiwalaa | Income Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #22c55e;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--primary);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 18px; font-weight: 400; opacity: 0.9; }
        .income-val { font-size: 48px; font-weight: 700; margin: 10px 0; display: block; }
        
        .card {
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        .app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .app-item {
            background: #f1f5f9;
            border: 2px solid transparent;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .app-item b { display: block; font-size: 15px; margin-bottom: 2px; }
        .app-item span { font-size: 12px; font-weight: 600; color: #64748b; }

        /* Click Logic */
        .app-item.active {
            background: #dcfce7;
            border-color: var(--success);
            color: #166534;
        }
        .app-item.active span { color: #166534; }

        .btn-save {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px 0 rgba(15, 23, 42, 0.39);
        }
        .btn-save:active { transform: scale(0.98); }
        
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sainiwalaa Today's Income</h1>
        <span class="income-val">₹ <span id="totalDisplay">0</span></span>
        <div id="dateNow" style="font-size: 13px; opacity: 0.7;"></div>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Candidate Name</label>
            <input type="text" id="name" placeholder="Naam likhein...">
        </div>
        
        <div class="input-group">
            <label>Mobile Number</label>
            <input type="number" id="mobile" placeholder="Mobile no...">
        </div>

        <label>Select Registered Apps</label>
        <div class="app-grid">
            <div class="app-item" onclick="selectApp(this, 150, 'Upstox')">
                <b>Upstox</b> <span>₹150</span>
            </div>
            <div class="app-item" onclick="selectApp(this, 320, 'Tide')">
                <b>Tide</b> <span>₹320</span>
            </div>
            <div class="app-item" onclick="selectApp(this, 150, 'mStock')">
                <b>mStock</b> <span>₹150</span>
            </div>
            <div class="app-item" onclick="selectApp(this, 260, 'AngelOne')">
                <b>Angel One</b> <span>₹260</span>
            </div>
        </div>

        <button class="btn-save" id="saveBtn" onclick="submitToSheet()">Submit Record</button>
    </div>

    <div class="footer">Powered by Sainiwalaa Tech CRM</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzhOPkJtv8txQD5rtkZ6Zui9qZWTLSTFdk2qZR4qK231F1wnleBZ9flcJSqRXMZqcPr/exec";
    
    let total = 0;
    let selected = [];

    document.getElementById('dateNow').innerText = new Date().toDateString();

    function selectApp(el, price, name) {
        if(el.classList.contains('active')) {
            el.classList.remove('active');
            total -= price;
            selected = selected.filter(a => a !== name);
        } else {
            el.classList.add('active');
            total += price;
            selected.push(name);
        }
        document.getElementById('totalDisplay').innerText = total;
    }

    function submitToSheet() {
        const uName = document.getElementById('name').value;
        const uMob = document.getElementById('mobile').value;
        const btn = document.getElementById('saveBtn');

        if(!uName || selected.length === 0) {
            alert("Details bharna zaroori hai!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Saving Data...";

        const payload = {
            name: uName,
            mobile: uMob,
            apps: selected.join(", "),
            income: total
        };

        fetch(API, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Entry Saved Successfully! ✅");
            window.location.reload();
        }).catch(() => {
            alert("Error saving data!");
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
