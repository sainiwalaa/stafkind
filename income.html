<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Tracker</title>

<style>
body{font-family:Arial;background:#f1f5f9;margin:0;padding:10px;}
.box{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px;}
input{padding:10px;width:100%;margin:5px 0;border-radius:8px;border:1px solid #ccc;}
button{padding:12px;width:100%;background:#0f172a;color:#fff;border:none;border-radius:10px;}
.chip{display:inline-block;padding:8px 12px;background:#ddd;border-radius:20px;margin:5px;cursor:pointer;}
.active{background:green;color:#fff;}
.item{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:8px;}
</style>
</head>

<body>

<div class="box">
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">

<div>
<span class="chip" onclick="sel(this,150,'Upstox')">Upstox 150</span>
<span class="chip" onclick="sel(this,320,'Tide')">Tide 320</span>
<span class="chip" onclick="sel(this,150,'mStock')">mStock 150</span>
<span class="chip" onclick="sel(this,260,'Angel')">Angel 260</span>
</div>

<button onclick="send()">Save</button>
</div>

<div class="box">
<h3 id="total">Total ₹0</h3>
<div id="list"></div>
</div>

<script>
const API = "PASTE_YOUR_NEW_DEPLOY_URL_HERE";

let apps=[];
let income=0;

function sel(el,price,name){
  if(el.classList.contains("active")){
    el.classList.remove("active");
    income-=price;
    apps=apps.filter(a=>a!=name);
  }else{
    el.classList.add("active");
    income+=price;
    apps.push(name);
  }
}

async function send(){
  let name=document.getElementById("name").value;
  let mobile=document.getElementById("mobile").value;

  if(!name || apps.length==0){
    alert("Name aur app select karo");
    return;
  }

  let data={
    name:name,
    mobile:mobile,
    apps:apps.join(","),
    income:income
  };

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("Saved ✅");
  location.reload();
}

async function load(){
  let res=await fetch(API);
  let data=await res.json();

  let html="";
  let total=0;

  data.reverse().forEach(d=>{
    html+=`
    <div class="item">
      <div>${d.name}<br><small>${d.apps}</small></div>
      <div>₹${d.income}</div>
    </div>`;
    total+=Number(d.income);
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText="Total ₹"+total;
}

load();
</script>

</body>
</html>
