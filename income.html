<script>
    // ⚠️ APNI NAYI DEPLOY URL YAHAN DALEIN
    const API = "https://script.google.com/macros/s/AKfycby86a8hHJl76614y1r7JlPeOXsV_d3J8UxkYnXK7WXySzkobd_OyJGcwrf_4bZijY3w/exec"; 
    
    let selectedApps = [];
    let currentIncome = 0;

    function toggleApp(el, price, name) {
        if(el.classList.contains('active')) {
            el.classList.remove('active');
            currentIncome -= price;
            selectedApps = selectedApps.filter(a => a !== name);
        } else {
            el.classList.add('active');
            currentIncome += price;
            selectedApps.push(name);
        }
    }

    function submitData() {
        const n = document.getElementById('name').value;
        const m = document.getElementById('mobile').value;
        if(!n || selectedApps.length === 0) return alert("Fill Name & Select App");

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "Saving...";
        
        const payload = { name: n, mobile: m, apps: selectedApps.join(", "), income: currentIncome };

        // Post request with stringified body
        fetch(API, { 
            method: "POST", 
            body: JSON.stringify(payload) 
        })
        .then(res => {
            alert("Data Saved Successfully! ✅");
            resetForm();
            fetchList(); // List refresh
        })
        .catch(err => {
            console.log(err);
            // No-cors mein error aata hai par data save ho jata hai
            setTimeout(() => { fetchList(); resetForm(); }, 2000);
        });
    }

    function fetchList() {
        document.getElementById('loader').style.display = "block";
        fetch(API)
        .then(res => res.json())
        .then(data => {
            let html = "";
            let dayTotal = 0;
            // Naya data upar dikhane ke liye reverse
            data.slice().reverse().forEach(item => {
                html += `
                    <div class="list-item">
                        <div class="info">
                            <b>${item.name}</b>
                            <span>${item.apps} | ${item.mobile}</span>
                        </div>
                        <div class="amt">₹${item.income}</div>
                    </div>
                `;
                dayTotal += Number(item.income);
            });
            document.getElementById('records').innerHTML = html;
            document.getElementById('totalDay').innerText = "Total: ₹ " + dayTotal;
            document.getElementById('loader').style.display = "none";
        });
    }

    function resetForm() {
        document.getElementById('name').value = "";
        document.getElementById('mobile').value = "";
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = false;
        saveBtn.innerText = "Save & Add to List";
        selectedApps = [];
        currentIncome = 0;
    }

    fetchList();
</script>
