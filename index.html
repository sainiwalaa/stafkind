<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STAFKIND CRM</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:#fff;
}

.title{
  font-size:22px;
  color:#1e3c72;
  font-weight:bold;
}

.logo-box{
  width:70px;
  height:70px;
  border-radius:10px;
  overflow:hidden;
  border:2px solid #1e3c72;
}
.logo-box img{
  width:100%;
  height:100%;
}

/* NOTE */
.note-bar{
  background:#ffc107;
  padding:10px;
  font-weight:bold;
}

/* TABLE */
.container{padding:10px;}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th{
  background:#111;
  color:#fff;
  padding:8px;
}
td{
  padding:5px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

button{
  padding:5px;
  border:none;
  border-radius:5px;
  margin:2px;
  cursor:pointer;
}
.option{background:#ddd;}
.active{background:#4caf50;color:#fff;}
.save{background:#2196f3;color:#fff;}

input,textarea{
  width:100%;
  padding:5px;
}

/* MOBILE */
@media(max-width:600px){
table{display:block;overflow-x:auto;}
}
</style>

</head>

<body>

<div class="header">
<div class="title">STAFKIND CRM</div>
<div class="logo-box"><img src="logo.jpg"></div>
</div>

<div class="note-bar">
⚠️ WhatsApp open rakho aur fast kaam karo
</div>

<div class="container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Send</th>
<th>Call</th>
<th>Meeting</th>
<th>Feedback</th>
<th>Recall</th>
<th>Join</th>
<th>Refer</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyfpB_xzP53gQqhZAP_LwKy3jb1V9X_ymKjIm93DRWTwTB34BCFR6TWNZNdWSXVhzth/exec";

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach((item,i)=>{
html+=`<tr>

<td>${item.date||''}</td>
<td>${item.name}</td>
<td>${item.phone}</td>

<td>
<button onclick="sendMeet('${item.phone}','${item.meet}')">Meet</button>
<button onclick="sendApp('${item.phone}')">App</button>
</td>

<td>
<button class="option" onclick="setVal('call${i}','Busy')">Busy</button>
<button class="option" onclick="setVal('call${i}','Switch Off')">Off</button>
<button class="option" onclick="setVal('call${i}','Wrong Number')">Wrong</button>
<button class="option" onclick="setVal('call${i}','Connect Now')">Connect</button>
<input id="call${i}">
</td>

<td>
<input id="meet${i}">
</td>

<td><textarea id="fb${i}"></textarea></td>

<td>
<button class="option" onclick="setVal('recall${i}','Send Meeting Link')">Meeting</button>
<button class="option" onclick="setVal('recall${i}','Send App Link')">App</button>
<button class="option" onclick="setVal('recall${i}','Not Interested')">Not</button>
<input id="recall${i}">
</td>

<td>
<button class="option" onclick="setVal('join${i}','Training Start')">Training</button>
<button class="option" onclick="setVal('join${i}','Only Join')">Join</button>
<button class="option" onclick="setVal('join${i}','Not Start')">Not</button>
<input id="join${i}">
</td>

<td>
<button class="option" onclick="toggleMulti(this,'ref${i}','Mstock')">Mstock</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Angle')">Angle</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Upstox')">Upstox</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Tide')">Tide</button>
<input id="ref${i}">
</td>

<td>
<input id="status${i}" placeholder="Type...">
</td>

<td>
<button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button>
</td>

</tr>`;
});
document.getElementById("data").innerHTML=html;
});
}

function setVal(id,val){
document.getElementById(id).value=val;
}

function toggleMulti(btn,id,val){
btn.classList.toggle("active");
let current=document.getElementById(id).value;
current = current.includes(val) ? current.replace(val,"") : current + (current?",":"")+val;
document.getElementById(id).value=current;
}

/* WhatsApp */
function sendMeet(phone, link){
let msg=`Hello 👋

Your meeting link:
${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

function sendApp(phone){
let msg=`Download App Link 👇
https://your-app-link`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

/* SAVE */
function save(i,name,phone){
const payload={
name:name,
mobile:phone,
call:document.getElementById("call"+i).value,
meeting:document.getElementById("meet"+i).value,
feedback:document.getElementById("fb"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
refer:document.getElementById("ref"+i).value,
status:document.getElementById("status"+i).value
};

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify(payload)
})
.then(()=>alert("Saved ✅"));
}

loadData();

</script>

</body>
</html>
