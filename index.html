<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

/* HEADER */
.header{
  background:#ffffff;
  color:#1e293b;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.4);
}

/* NAME */
.name{
  font-size:16px;
  font-weight:bold;
}

.phone{
  color:#94a3b8;
  font-size:14px;
}

/* BUTTON GROUP */
.btn-group{
  margin-top:8px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
}

/* COLORS */
.call{background:#334155;color:#fff;}
.recall{background:#475569;color:#fff;}
.join{background:#6366f1;color:#fff;}
.save{background:#22c55e;color:#fff;}
.wa{background:#25D366;color:#fff;}

input,textarea{
  width:100%;
  margin-top:6px;
  padding:6px;
  border-radius:6px;
  border:none;
}

/* MOBILE */
@media(max-width:600px){
  .header{font-size:16px;}
}
</style>

</head>

<body>

<div class="header">
CRM Dashboard
<span>Work Panel</span>
</div>

<div class="container" id="data"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbym8RG_PTgWYodIvH3g1_gZYZkPnBvBo5APBdaikGD5C1WA4iXH4GA0D1LyT18IK00s/exec";

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{
let html="";

data.forEach((item,i)=>{

html+=`
<div class="card">

<div class="name">${item.name}</div>
<div class="phone">${item.phone}</div>

<div class="btn-group">
<button class="wa" onclick="sendMeet('${item.phone}','${item.meet}')">Send Meet</button>
</div>

<!-- CALL -->
<div class="btn-group">
<button class="call" onclick="setVal('call${i}','Busy')">Busy</button>
<button class="call" onclick="setVal('call${i}','Switch Off')">Off</button>
<button class="call" onclick="setVal('call${i}','Wrong')">Wrong</button>
<button class="call" onclick="setVal('call${i}','Connected')">Connect</button>
</div>
<input id="call${i}" placeholder="Call status">

<!-- RECALL -->
<div class="btn-group">
<button class="recall" onclick="setVal('recall${i}','Send Meeting')">Meeting</button>
<button class="recall" onclick="setVal('recall${i}','Send App')">App</button>
<button class="recall" onclick="setVal('recall${i}','Not Interested')">Not</button>
</div>
<input id="recall${i}" placeholder="Recall">

<!-- JOIN -->
<div class="btn-group">
<button class="join" onclick="setVal('join${i}','Training Start')">Training</button>
<button class="join" onclick="setVal('join${i}','Only Join')">Join</button>
<button class="join" onclick="setVal('join${i}','Not Start')">Not</button>
</div>
<input id="join${i}" placeholder="Join status">

<textarea id="fb${i}" placeholder="Feedback"></textarea>

<input id="status${i}" placeholder="Status">

<button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button>

</div>
`;

});

document.getElementById("data").innerHTML=html;
});
}

/* SET VALUE */
function setVal(id,val){
document.getElementById(id).value=val;
}

/* WHATSAPP */
function sendMeet(phone,link){
let msg=`Hello 👋

Join meeting:
${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

/* SAVE */
function save(i,name,phone){

const payload={
name:name,
mobile:phone,
call:document.getElementById("call"+i).value,
meeting:"",
feedback:document.getElementById("fb"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
refer:"",
status:document.getElementById("status"+i).value
};

fetch(API,{
method:"POST",
body: JSON.stringify(payload)
})
.then(()=>alert("Saved ✅"));

}

loadData();

</script>

</body>
</html>
