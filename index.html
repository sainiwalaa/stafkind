<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STAFKIND CRM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

.header{
  background:#0b3d91;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

.logo{font-weight:bold;font-size:18px;}

.dashbtn{
  background:#22c55e;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.note{
  background:#facc15;
  padding:5px;
}

.container{
  height:80vh;
  overflow:auto;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  position:sticky;
  top:0;
  background:#0b3d91;
  color:#fff;
  padding:8px;
}

td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

input{
  width:100%;
}

button{
  padding:4px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

.save{background:#22c55e;color:#fff;}
.wa{background:#25D366;color:#fff;}

/* POPUP */
#scriptPopup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-box{
  background:#fff;
  width:90%;
  max-width:500px;
  margin:5% auto;
  padding:15px;
  border-radius:8px;
}

#scriptText{
  white-space:pre-wrap;
  max-height:65vh;
  overflow:auto;
  font-size:13px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">STAFKIND CRM</div>
  <div>
    <button class="dashbtn" onclick="openDashboard()">🔐 Login Dashboard</button>
    <button class="dashbtn" onclick="openScript()">📖 Script</button>
  </div>
</div>

<div class="note">
<marquee>⚠️ Calling ke time WhatsApp & Dashboard login rakhe</marquee>
</div>

<div class="container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Send</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- SCRIPT POPUP -->
<div id="scriptPopup">
  <div class="popup-box">
    <div style="text-align:right;">
      <button onclick="closeScript()">❌</button>
    </div>

    <pre id="scriptText"></pre>
  </div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyKKk-P8MHC_kskC3FDN8pRrSBWJCXRCoUJyTfI2C_KqcYcmX8uaECjRquoVRzQegPo/exec";

function openDashboard(){
  window.open("https://offers.earnpati.com/auth/login","_blank");
}

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>render(data));
}

function render(data){
let html="";
data.forEach((item,i)=>{
html+=`
<tr>
<td>${item.date||''}</td>
<td>${item.name||''}</td>
<td>${item.phone||''}</td>

<td>
<button class="wa" onclick="sendMeet('${item.phone}','${item.meet}')">WA</button>
</td>

<td>
<input id="status${i}" value="${item.status||''}">
</td>

<td>
<button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button>
</td>
</tr>`;
});
document.getElementById("data").innerHTML=html;
}

function sendMeet(phone,link){
let msg=`Join meeting:\n${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

function save(i,name,phone){
const payload={
name:name,
mobile:phone,
status:document.getElementById("status"+i).value
};

fetch(API,{
method:"POST",
body:JSON.stringify(payload)
})
.then(()=>{ alert("Saved"); loadData(); });
}

/* SCRIPT (NO CHANGE — SAME AS YOU GAVE) */
function openScript(){
document.getElementById("scriptPopup").style.display="block";

let script=`√√ STAFKIND SERVICES √√

YOUR  CALLING SCRIPT 📖📕

HR- KYA MERI BAAT MISS SUSHMITA SE HO RAHI HAI.

CX....

HR- MAI HR ANKUSH BAAT KAR RAHA HU STAFKIND SERVICES SE,, 
HUMARI COMPANY ME APKI PROFILE SHORT LISTED HUI HAI AS A CUSTOMER SUPPORT PART TIME WORK FROM HOME KE LIYE,,

& APKI JO SALARY HOGA 12K TO 15K INHAND ,, SO ARE YOU INTERESTED?

CX.....

HR- OK, TO JITNE CANDIDATE KA PROFILE SHORTLISTED HUE HAI UNKA AFTERNOON 2PM EK SESSION HAI..🕦
SESSION ME APKO EACH AND EVERYTHING GUIDE KAR DIYA JAYEGA LIKE APKA SALARY KITNA HOGE , PROCESS KY HOGA , KITNE HOURS APKA WORK RAHEGA EACH & EVERYTHING APKO GUIDE KAR DIYA JAYEGA
KYA APKA YE WHATSAAP NUMBER HAI?

HR- OK MAI APKO GOOGLE MEET KA LINK SEND KAR DETA HU AP 2:00 PM SE SESSION JOIN KAR LENA & MERA NUMBER BHI SAVE KAR LIJIYE JISSE AP SESSION KE BAAD CONTACT KAR SAKTE HAI.`;

document.getElementById("scriptText").innerText = script;
}

function closeScript(){
document.getElementById("scriptPopup").style.display="none";
}

loadData();

</script>

</body>
</html>
