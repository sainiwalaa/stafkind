<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Smart CRM</title>

<style>
body {
  font-family: Arial;
  background:#eef2f7;
  padding:20px;
}

h2 {
  text-align:center;
}

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

th {
  background:#111;
  color:#fff;
  padding:10px;
}

td {
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

tr:hover {
  background:#f1f5f9;
}

button {
  padding:5px 8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.yes {background:#22c55e;color:#fff;}
.no {background:#ef4444;color:#fff;}
.save {background:#2563eb;color:#fff;}
.call {background:#10b981;color:#fff;}

input {
  width:100%;
  padding:5px;
  border:1px solid #ccc;
  border-radius:5px;
}

.status {
  font-size:12px;
}
</style>

</head>

<body>

<h2>📊 Smart CRM Dashboard</h2>

<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Call</th>
<th>Meeting</th>
<th>Feedback</th>
<th>Problem</th>
<th>Recall</th>
<th>Join</th>
<th>Refer</th>
<th>Save</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbyW06DRLqD26jrsoR5QWXuh_zwkm_PNVZGGRtiR6d3AHTTEMNSc7-5n0o724Dy1Y21g/exec";

function loadData(){
fetch(API)
.then(res => res.json())
.then(data => {

let html = "";

data.forEach((item,i) => {

html += `
<tr>

<td>${item.date}</td>
<td>${item.name}</td>
<td>${item.phone}</td>

<td>
<button class="yes" onclick="setVal('call${i}','Yes')">Yes</button>
<button class="no" onclick="setVal('call${i}','No')">No</button>
<input id="call${i}" value="${item.call || ''}">
</td>

<td>
<button class="yes" onclick="setVal('meet${i}','Yes')">Yes</button>
<button class="no" onclick="setVal('meet${i}','No')">No</button>
<input id="meet${i}" value="${item.meeting || ''}">
</td>

<td><input id="fb${i}" value="${item.feedback || ''}"></td>
<td><input id="prob${i}" value="${item.problem || ''}"></td>
<td><input id="recall${i}" value="${item.recall || ''}"></td>
<td><input id="join${i}" value="${item.join || ''}"></td>
<td><input id="ref${i}" value="${item.refer || ''}"></td>

<td>
<button class="save" onclick="save(${i})">Save</button>
<div id="msg${i}" class="status"></div>
</td>

</tr>
`;

});

document.getElementById("data").innerHTML = html;

});
}

function setVal(id,val){
document.getElementById(id).value = val;
}

function save(i){

document.getElementById("msg"+i).innerText = "Saving...";

const payload = {
row: i,
call: document.getElementById("call"+i).value,
meeting: document.getElementById("meet"+i).value,
feedback: document.getElementById("fb"+i).value,
problem: document.getElementById("prob"+i).value,
recall: document.getElementById("recall"+i).value,
join: document.getElementById("join"+i).value,
refer: document.getElementById("ref"+i).value
};

fetch(API,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body: JSON.stringify(payload)
})
.then(res => res.json())
.then(res => {
if(res.status==="success"){
document.getElementById("msg"+i).innerText = "Saved ✅";
loadData();
}else{
document.getElementById("msg"+i).innerText = "Error ❌";
}
})
.catch(()=>{
document.getElementById("msg"+i).innerText = "Network Error ❌";
});

}

loadData();

</script>

</body>
</html>
