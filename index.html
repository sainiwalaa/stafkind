<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Advanced CRM</title>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px;}
h2{text-align:center;}

table{width:100%;border-collapse:collapse;background:#fff;}
th{background:#111;color:#fff;padding:10px;}
td{padding:8px;border-bottom:1px solid #ddd;text-align:center;}

button{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  margin:2px;
  cursor:pointer;
}

.yes{background:#22c55e;color:#fff;}
.no{background:#ef4444;color:#fff;}
.option{background:#e5e7eb;}
.active{background:#22c55e;color:#fff;}

.save{background:#2563eb;color:#fff;}

input{width:100%;padding:5px;border:1px solid #ccc;border-radius:5px;}
.small{font-size:11px;color:#555;}
</style>

</head>

<body>

<h2>📊 Smart Button CRM</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Call</th>
<th>Meeting</th>
<th>Problem</th>
<th>Recall</th>
<th>Join</th>
<th>Refer</th>
<th>Save</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const API="https://script.google.com/macros/s/AKfycbyW06DRLqD26jrsoR5QWXuh_zwkm_PNVZGGRtiR6d3AHTTEMNSc7-5n0o724Dy1Y21g/exec";

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach((item,i)=>{

html+=`
<tr>

<td>${item.name}</td>
<td>${item.phone}</td>

<td>
<button class="yes" onclick="setVal('call${i}','Yes')">Yes</button>
<button class="no" onclick="setVal('call${i}','No')">No</button>
<input id="call${i}" value="${item.call||''}">
</td>

<td>
<button class="yes" onclick="setVal('meet${i}','Yes')">Yes</button>
<button class="no" onclick="setVal('meet${i}','No')">No</button>
<input id="meet${i}" value="${item.meeting||''}">
</td>

<td>
<button class="option" onclick="setVal('prob${i}','Not Interested')">Not Int</button>
<button class="option" onclick="setVal('prob${i}','Busy')">Busy</button>
<button class="option" onclick="setVal('prob${i}','Wrong No')">Wrong</button>
<input id="prob${i}" value="${item.problem||''}">
</td>

<td>
<button class="option" onclick="setVal('recall${i}','Call Again')">Call Again</button>
<button class="option" onclick="setVal('recall${i}','No Contact')">No Contact</button>
<input id="recall${i}" value="${item.recall||''}">
</td>

<td>
<button class="option" onclick="setVal('join${i}','Join Done')">Join Done</button>
<button class="option" onclick="setVal('join${i}','Not Join')">Not Join</button>
<input id="join${i}" value="${item.join||''}">
</td>

<td>
<button class="option" onclick="toggleMulti(this,'ref${i}','Mstock')">Mstock</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Angle')">Angle</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Upstox')">Upstox</button>
<button class="option" onclick="toggleMulti(this,'ref${i}','Tide')">Tide</button>
<input id="ref${i}" value="${item.refer||''}">
</td>

<td>
<button class="save" onclick="save(${i})">Save</button>
<div id="msg${i}" class="small"></div>
</td>

</tr>
`;

});

document.getElementById("data").innerHTML=html;

});
}

function setVal(id,val){
document.getElementById(id).value=val;
}

function toggleMulti(btn,id,val){
btn.classList.toggle("active");

let current=document.getElementById(id).value;

if(current.includes(val)){
current=current.replace(val,"").replace(",,",",");
}else{
current+= (current? ",":"")+val;
}

document.getElementById(id).value=current;
}

function save(i){

document.getElementById("msg"+i).innerText="Saving...";

const payload={
row:i,
call:document.getElementById("call"+i).value,
meeting:document.getElementById("meet"+i).value,
problem:document.getElementById("prob"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
refer:document.getElementById("ref"+i).value
};

fetch(API,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify(payload)
})
.then(res=>res.json())
.then(res=>{
document.getElementById("msg"+i).innerText="Saved ✅";
})
.catch(()=>{
document.getElementById("msg"+i).innerText="Error ❌";
});

}

loadData();

</script>

</body>
</html>
