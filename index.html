<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STAFKIND CRM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

/* HEADER */
.header{
  background:#0b3d91;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:5;
}

.logo{font-weight:bold;font-size:18px;}

.dashbtn{
  background:#22c55e;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  margin-left:5px;
}

.note{
  background:#facc15;
  padding:5px;
  font-size:13px;
}

.filter{
  background:#fff;
  padding:6px;
  text-align:center;
}

.container{
  height:80vh;
  overflow:auto;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  position:sticky;
  top:0;
  background:#0b3d91;
  color:#fff;
  padding:8px;
  font-size:12px;
}

td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-size:12px;
}

input{
  width:100%;
  padding:3px;
  font-size:11px;
}

button{
  padding:3px 5px;
  border:none;
  border-radius:4px;
  margin:2px;
  cursor:pointer;
  font-size:10px;
}

.call{background:#e2e8f0;}
.recall{background:#fde68a;}
.join{background:#c7d2fe;}
.save{background:#22c55e;color:#fff;}
.wa{background:#25D366;color:#fff;}

.active{background:#22c55e !important;color:#fff;}

#scriptPopup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.popup-box{
  background:#fff;
  width:90%;
  max-width:500px;
  margin:5% auto;
  padding:15px;
  border-radius:8px;
}

#scriptText{
  white-space:pre-wrap;
  max-height:65vh;
  overflow:auto;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">STAFKIND CRM</div>
  <div>
    <button class="dashbtn" onclick="openDashboard()">🔐 Dashboard</button>
    <button class="dashbtn" onclick="openScript()">📖 Script</button>
  </div>
</div>

<div class="note">
<marquee>⚠️ कॉल करते समय WhatsApp और Dashboard Login रखें</marquee>
</div>

<div class="container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Send</th>
<th>Call</th>
<th>Recall</th>
<th>Join</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<!-- SCRIPT POPUP -->
<div id="scriptPopup">
  <div class="popup-box">

    <div style="text-align:right;">
      <button onclick="closeScript()">❌</button>
    </div>

    <div style="text-align:center;">
      <button onclick="setLang('hin')">Hindi</button>
      <button onclick="setLang('eng')">English</button>
    </div>

    <pre id="scriptText"></pre>

  </div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyKKk-P8MHC_kskC3FDN8pRrSBWJCXRCoUJyTfI2C_KqcYcmX8uaECjRquoVRzQegPo/exec";

let globalData=[];

function openDashboard(){
  window.open("https://offers.earnpati.com/auth/login","_blank");
}

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{
globalData=data;
render(data);
});
}

function render(data){
let html="";
data.forEach((item,i)=>{

html+=`
<tr>
<td>${item.date||''}</td>
<td>${item.name||''}</td>
<td>${item.phone||''}</td>

<td><button class="wa" onclick="sendMeet('${item.phone}','${item.meet}')">WA</button></td>

<td><input id="call${i}" value="${item.call||''}"></td>
<td><input id="recall${i}" value="${item.recall||''}"></td>
<td><input id="join${i}" value="${item.join||''}"></td>
<td><input id="status${i}" value="${item.status||''}"></td>

<td><button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button></td>
</tr>`;
});
document.getElementById("data").innerHTML=html;
}

function sendMeet(phone,link){
let msg=`Join meeting:\n${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

function save(i,name,phone){
const payload={
name:name,
mobile:phone,
call:document.getElementById("call"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
status:document.getElementById("status"+i).value
};

fetch(API,{
method:"POST",
body:JSON.stringify(payload)
})
.then(()=>{ alert("Saved"); loadData(); });
}

/* SCRIPT SYSTEM */
let currentLang="hin";

function openScript(){
document.getElementById("scriptPopup").style.display="block";
loadScript();
}

function closeScript(){
document.getElementById("scriptPopup").style.display="none";
}

function setLang(l){
currentLang=l;
loadScript();
}

let hin=`√√ STAFKIND SERVICES √√

YOUR  CALLING SCRIPT 📖📕

SESSION ME APKO EACH AND EVERYTHING GUIDE KAR DIYA JAYEGA LIKE APKA SALARY KITNA HOGE , PROCESS KY HOGA , KITNE HOURS APKA WORK RAHEGA EACH & EVERYTHING APKO GUIDE KAR DIYA JAYEGA
KYA APKA YE WHATSAAP NUMBER HAI?

CX....

HR- OK MAI APKO GOOGLE MEET KA LINK SEND KAR DETA HU AP 2:00 PM SE SESSION JOIN KAR LENA & MERA NUMBER BHI SAVE KAR LIJIYE JISSE AP SESSION KE BAAD CONTACT KAR SAKTE HAI.`;


let eng=`√√ STAFKIND SERVICES √√

YOUR  CALLING SCRIPT 📖📕

CX....

JOIN AT 2:00 PM AND SAVE MY NUMBER FOR CONTACT AFTER SESSION.`;


document.getElementById("scriptText").innerText =
(currentLang==="hin") ? hin : eng;

}

loadData();

</script>

</body>
</html>
