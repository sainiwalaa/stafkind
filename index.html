<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STAFKIND CRM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f7;
}

/* HEADER */
.header{
  background:#0b3d91;
  color:#fff;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

/* RUNNING NOTE */
.note{
  background:#facc15;
  color:#000;
  padding:5px;
  font-size:13px;
}

marquee{
  font-weight:bold;
}

/* FILTER SMALL BUTTON */
.filter{
  padding:8px;
  text-align:center;
  background:#fff;
}

.filter input{
  padding:5px;
}

.filter button{
  padding:6px 10px;
  background:#0b3d91;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* TABLE */
.container{
  height:80vh;
  overflow:auto;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  position:sticky;
  top:0;
  background:#0b3d91;
  color:#fff;
  padding:8px;
  font-size:13px;
  z-index:2;
}

td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-size:13px;
}

/* INPUT */
input{
  width:100%;
  padding:4px;
  border-radius:4px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  padding:4px 6px;
  border:none;
  border-radius:4px;
  margin:2px;
  cursor:pointer;
  font-size:11px;
}

.call{background:#e2e8f0;}
.recall{background:#fde68a;}
.join{background:#c7d2fe;}
.save{background:#22c55e;color:#fff;}
.wa{background:#25D366;color:#fff;}

.active{background:#22c55e !important;color:#fff;}

/* COLOR TRACK */
.stage1{background:#dcfce7;}
.stage2{background:#bbf7d0;}
.stage3{background:#86efac;}
.stage4{background:#4ade80;}
.stage5{background:#22c55e;color:#fff;}

</style>

</head>

<body>

<div class="header">
  <div class="logo">STAFKIND CRM</div>
  <div>📞 Dashboard</div>
</div>

<div class="note">
<marquee>⚠ WhatsApp open rakho aur fast kaam karo | Daily calling complete karo | Data save karna na bhule</marquee>
</div>

<div class="filter">
<input type="date" id="dateFilter">
<button onclick="filterData()">Search</button>
<button onclick="loadData()">All</button>
</div>

<div class="container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Send</th>
<th>Call</th>
<th>Recall</th>
<th>Join</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzCtPtjA76jf-F0JpO4pM7wu6JHJffv45zX8al5-aKEftK0IqHCclZZ_E-s4dURdl0/exec";

let globalData=[];

/* LOAD */
function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{
globalData=data;
render(data);
});
}

/* RENDER */
function render(data){

let html="";

data.forEach((item,i)=>{

let count=parseInt(item.count||0);
let stage="";

if(count==1) stage="stage1";
else if(count==2) stage="stage2";
else if(count==3) stage="stage3";
else if(count==4) stage="stage4";
else if(count>=5) stage="stage5";

html+=`
<tr id="row${i}" class="${stage}" data-count="${count}">

<td>${item.date||''}</td>
<td>${item.name||''}</td>
<td>${item.phone||''}</td>

<td>
<button class="wa" onclick="sendMeet('${item.phone}','${item.meet}')">Send</button>
</td>

<td>
<button class="call" onclick="setVal('call${i}','Busy',this)">Busy</button>
<button class="call" onclick="setVal('call${i}','Connect',this)">Connect</button>
<input id="call${i}" value="${item.call||''}">
</td>

<td>
<button class="recall" onclick="setVal('recall${i}','Meeting',this)">Meeting</button>
<button class="recall" onclick="setVal('recall${i}','Not Interested',this)">Not</button>
<input id="recall${i}" value="${item.recall||''}">
</td>

<td>
<button class="join" onclick="setVal('join${i}','Join',this)">Join</button>
<input id="join${i}" value="${item.join||''}">
</td>

<td>
<input id="status${i}" value="${item.status||''}">
</td>

<td>
<button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button>
</td>

</tr>`;
});

document.getElementById("data").innerHTML=html;
}

/* FILTER */
function filterData(){

let selected=document.getElementById("dateFilter").value;
if(!selected){ alert("Select Date"); return; }

let d=new Date(selected);
let formatted = String(d.getDate()).padStart(2,'0') + "/" +
                String(d.getMonth()+1).padStart(2,'0') + "/" +
                d.getFullYear();

let filtered = globalData.filter(x => (x.date||"").trim()===formatted);

if(filtered.length==0){
alert("No Data Found");
}

render(filtered);
}

/* BUTTON */
function setVal(id,val,btn){
document.getElementById(id).value=val;
btn.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* WHATSAPP */
function sendMeet(phone,link){
let msg=`Join meeting:\n${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

/* SAVE */
function save(i,name,phone){

let row=document.getElementById("row"+i);
let count=parseInt(row.getAttribute("data-count")||0);
count++;

row.setAttribute("data-count",count);

row.classList.remove("stage1","stage2","stage3","stage4","stage5");

if(count==1) row.classList.add("stage1");
else if(count==2) row.classList.add("stage2");
else if(count==3) row.classList.add("stage3");
else if(count==4) row.classList.add("stage4");
else row.classList.add("stage5");

const payload={
name:name,
mobile:phone,
call:document.getElementById("call"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
status:document.getElementById("status"+i).value
};

fetch(API,{
method:"POST",
body:JSON.stringify(payload)
})
.then(()=>{
alert("✅ Saved");
loadData();
});
}

loadData();

</script>

</body>
</html>
