<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Live CRM Dashboard</title>

<style>
body {font-family:Arial; background:#f4f6f9; padding:20px;}

h2 {text-align:center;}

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th {background:#222;color:#fff;}

button {
  padding:5px 8px;
  cursor:pointer;
}

.call {background:green;color:#fff;}
.refresh {background:#007bff;color:#fff;margin-bottom:10px;}
</style>

</head>

<body>

<h2>📊 Live CRM Dashboard</h2>

<button class="refresh" onclick="loadData()">🔄 Refresh</button>

<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Call</th>
<th>Status</th>
<th>Feedback</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbzz7cpG5W9wd97vX4AesX605KTH-4CnQedIo4V9Qr-ABGHMRDhdhaqtwP8VMW_XQ5UL/exec";

function loadData(){

fetch(API)
.then(res => res.json())
.then(data => {

let html = "";

data.forEach(item => {

html += `
<tr>
<td>${item.date}</td>
<td>${item.name}</td>
<td>${item.phone}</td>

<td>
<a href="tel:${item.phone}">
<button class="call">📞 Call</button>
</a>
</td>

<td>${item.callStatus || "Pending"}</td>

<td>${item.feedback || ""}</td>

</tr>
`;

});

document.getElementById("data").innerHTML = html;

});

}

// पहली बार load
loadData();

// हर 10 सेकंड में auto refresh
setInterval(loadData, 10000);

</script>

</body>
</html>
