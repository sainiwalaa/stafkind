<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

.header{
  background:#fff;
  color:#000;
  padding:12px;
  font-weight:bold;
  font-size:18px;
}

.container{padding:10px;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  color:#000;
}

th{
  background:#111;
  color:#fff;
  padding:8px;
  font-size:13px;
}

td{
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
  font-size:13px;
}

input{
  width:100%;
  padding:4px;
  border-radius:4px;
  border:1px solid #ccc;
}

button{
  padding:4px 6px;
  border:none;
  border-radius:4px;
  margin:2px;
  cursor:pointer;
  font-size:11px;
}

.call{background:#e2e8f0;}
.recall{background:#fde68a;}
.join{background:#c7d2fe;}
.save{background:#22c55e;color:#fff;}
.wa{background:#25D366;color:#fff;}

.active{background:#22c55e !important;color:#fff;}

/* 🔥 SAVE STAGES */
.stage1{background:#dcfce7 !important;}
.stage2{background:#bbf7d0 !important;}
.stage3{background:#86efac !important;}
.stage4{background:#4ade80 !important;}
.stage5{background:#22c55e !important;color:#fff;}

@media(max-width:600px){
  table{display:block;overflow-x:auto;}
}
</style>

</head>

<body>

<div class="header">📞 CRM Dashboard</div>

<div class="container">
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Mobile</th>
<th>Send</th>
<th>Call</th>
<th>Recall</th>
<th>Join</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzjFOomgDdBRRyAAasrxgWnvxEwabKOB49dvpjCWXl8UKMgsOKs6Hsfsawvm60wn4r7/exec";

function loadData(){
fetch(API)
.then(res=>res.json())
.then(data=>{
let html="";

data.forEach((item,i)=>{

let stageClass="";
let count = item.count || 0;

if(count==1) stageClass="stage1";
else if(count==2) stageClass="stage2";
else if(count==3) stageClass="stage3";
else if(count==4) stageClass="stage4";
else if(count>=5) stageClass="stage5";

html+=`<tr id="row${i}" class="${stageClass}" data-count="${count}">

<td>${item.date || ''}</td>
<td>${item.name}</td>
<td>${item.phone}</td>

<td>
<button class="wa" onclick="sendMeet('${item.phone}','${item.meet}')">Send</button>
</td>

<td>
<button class="call" onclick="setVal('call${i}','Busy',this)">Busy</button>
<button class="call" onclick="setVal('call${i}','Connect',this)">Connect</button>
<input id="call${i}" value="${item.call || ''}">
</td>

<td>
<button class="recall" onclick="setVal('recall${i}','Meeting',this)">Meeting</button>
<button class="recall" onclick="setVal('recall${i}','Not Interested',this)">Not</button>
<input id="recall${i}" value="${item.recall || ''}">
</td>

<td>
<button class="join" onclick="setVal('join${i}','Join',this)">Join</button>
<button class="join" onclick="setVal('join${i}','Training',this)">Training</button>
<input id="join${i}" value="${item.join || ''}">
</td>

<td>
<input id="status${i}" value="${item.status || ''}">
</td>

<td>
<button class="save" onclick="save(${i},'${item.name}','${item.phone}')">Save</button>
</td>

</tr>`;
});

document.getElementById("data").innerHTML=html;
});
}

function setVal(id,val,btn){
document.getElementById(id).value=val;

let group = btn.parentNode.querySelectorAll("button");
group.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");
}

function sendMeet(phone,link){
let msg=`Join meeting:\n${link}`;
window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`);
}

function save(i,name,phone){

let row = document.getElementById("row"+i);

// 🔥 COUNT SYSTEM
let count = parseInt(row.getAttribute("data-count") || 0);
count++;
row.setAttribute("data-count",count);

// 🔥 COLOR APPLY
row.classList.remove("stage1","stage2","stage3","stage4","stage5");

if(count==1) row.classList.add("stage1");
else if(count==2) row.classList.add("stage2");
else if(count==3) row.classList.add("stage3");
else if(count==4) row.classList.add("stage4");
else row.classList.add("stage5");

const payload={
name:name,
mobile:phone,
call:document.getElementById("call"+i).value,
recall:document.getElementById("recall"+i).value,
join:document.getElementById("join"+i).value,
status:document.getElementById("status"+i).value,
count:count
};

fetch(API,{
method:"POST",
body: JSON.stringify(payload)
})
.then(()=>console.log("Saved"));

}

loadData();

</script>

</body>
</html>
