<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAFKIND Link Sender</title>
<style>
:root { --primary:#0b3d91; --accent:#25D366; --bg:#f4f7fa; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; }

.sender-card {
    max-width: 600px; margin: auto; background: #fff;
    padding: 30px; border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { text-align: center; color: var(--primary); margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

.input-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 14px; }
input, select {
    width: 100%; padding: 12px; border: 1.5px solid #ddd;
    border-radius: 8px; box-sizing: border-box; font-size: 15px;
}

.action-buttons { display: flex; gap: 10px; margin-top: 20px; }

.btn {
    flex: 1; padding: 15px; border: none; border-radius: 8px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: 0.3s;
}

.btn-wa { background: var(--accent); color: white; }
.btn-copy { background: #64748b; color: white; }
.btn:hover { opacity: 0.9; transform: translateY(-1px); }

.preview-box {
    margin-top: 25px; padding: 15px; background: #f8fafc;
    border: 1px solid #e2e880; border-radius: 10px;
}
.preview-header { font-weight: bold; color: #64748b; margin-bottom: 10px; font-size: 12px; text-transform: uppercase; }
#msgPreview { font-size: 13px; color: #334155; white-space: pre-wrap; line-height: 1.5; font-family: sans-serif; }

.back-link { text-align: center; margin-top: 20px; }
.back-link a { color: #64748b; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>

<div class="sender-card">
    <h2>🔗 Professional Link Sender</h2>
    
    <div class="input-group">
        <label>Select Message Type</label>
        <select id="appType" onchange="updateContent()">
            <option value="standard">Standard (m.Stock/Upstox/Angel)</option>
            <option value="job_details">Job Details (WFH Description)</option>
            <option value="tide">Tide Registration (Telecaller)</option>
            <option value="about">About Stafkind (Landing Page)</option>
            <option value="not_interested">Not Interested / Referral Offer</option>
        </select>
    </div>

    <div class="input-group">
        <label>Candidate Name</label>
        <input type="text" id="custName" placeholder="Candidate ka naam" oninput="updatePreview()">
    </div>

    <div class="input-group">
        <label>WhatsApp Number</label>
        <input type="number" id="custPhone" placeholder="91XXXXXXXXXX">
    </div>

    <div class="input-group" id="linkGroup">
        <label>Registration / Info Link</label>
        <input type="text" id="regLink" placeholder="Link paste karein" oninput="updatePreview()">
    </div>

    <div class="input-group">
        <label>HR / Sender Name</label>
        <input type="text" id="hrName" value="Sunil Kumar Saini" oninput="updatePreview()">
    </div>

    <div class="action-buttons">
        <button class="btn btn-wa" onclick="sendWhatsApp()">WhatsApp ✅</button>
        <button class="btn btn-copy" onclick="copyToClipboard()">Copy SMS 📋</button>
    </div>

    <div class="preview-box">
        <div class="preview-header">Live Message Preview</div>
        <div id="msgPreview">Details enter karein...</div>
    </div>
    
    <div class="back-link">
        <a href="javascript:history.back()">← Back to CRM Dashboard</a>
    </div>
</div>

<script>
const tideLink = "https://share.trkep.in/share/69ecdca35995639f0d191273";
const landingPage = "https://sainiwalaa.github.io/stafkind/landing.html";

function updateContent() {
    const type = document.getElementById('appType').value;
    const linkInput = document.getElementById('regLink');
    
    if(type === 'tide' || type === 'not_interested') {
        linkInput.value = tideLink;
    } else if(type === 'about') {
        linkInput.value = landingPage;
    } else {
        linkInput.value = "";
    }
    updatePreview();
}

function generateMessage() {
    const type = document.getElementById('appType').value;
    const name = document.getElementById('custName').value || "Candidate";
    const link = document.getElementById('regLink').value || "[Link Here]";
    const hr = document.getElementById('hrName').value || "Sunil Kumar Saini";

    if (type === 'job_details') {
        return `*"PART TIME & FULL TIME WORK FROM HOME JOB"* Company Name : *STAFKIND SERVICES*

Company Location : *West Bengal, Kolkata*

Designation : *Customer support executive (CSE)*

Working process: *Voice Process*

Gadget required : *Mobile/Laptop/PC*

Working hours : *3-4 hrs in a day  (flexible Timings)*

 *Working days: *Monday to Friday*
 *Saturday and Sunday holiday*

Salary : *15000/-*+ *INCENTIVES*

Identification: *Virtual ID card will be given*

Trainings: *5 days*
*(Product and process related Training)*

*100% selection in Trainings with Zero Investment*

SUPPORT: *Mentors will be provided for newly joined Candidates in OJT what's app group*

*NO FEES AND NO INVESTMENT*



  Regards,
*RECRUITMENT    DEPARTMENT*
*STAFKIND SERVICES*`;
    }
    else if (type === 'tide') {
        return `Subject: Telecaller Position – Registration Process

Dear ${name},

Congratulations! You have been shortlisted for the Telecaller position at our company.

Please note that no device will be provided by the company. Therefore, you are requested to complete your registration process using the official HR link shared with you.

Before proceeding with registration, kindly ensure the following:

- Keep your Aadhaar Card, PAN Card, Bank Details, and DigiLocker access ready.
- Complete the registration process by yourself (self-registration only).
- Use only your mobile SIM data while registering. Avoid using Wi-Fi or any other network.
- Do not refresh the page during the registration process.
- In case of any error or issue, contact HR immediately for assistance.

Important Information:
After completing your Video KYC, to activate the withdrawal service, you need to add ₹50 to your account. Once ₹50 is added, the company will credit ₹25 + ₹25 extra, making a total of ₹100, which you can then withdraw.

Registration Link:
${link}

Please follow all the instructions carefully to ensure a smooth and successful registration.

Best Regards,
Recruitment Team`;
    }
    else if (type === 'standard') {
        return `Subject: Telecaller Position – Registration Process

Dear ${name},

Congratulations! You have been shortlisted for the Telecaller position at our company.

Please note that no device will be provided by the company. Therefore, you are requested to complete your registration process using the official HR link shared with you.

Before proceeding with registration, kindly ensure the following:

- Keep your Aadhaar Card, PAN Card, Bank Details, and DigiLocker access ready.
- Complete the registration process by yourself (self-registration only).
- Use only your mobile SIM data while registering. Avoid using Wi-Fi or any other network.
- Do not refresh the page during the registration process.
- In case of any error or issue, contact HR immediately for assistance.

Please follow all the instructions carefully to ensure a smooth and successful registration.

Your link here: ${link}

Best Regards,
Recruitment Team`;
    }
    else if (type === 'about') {
        return `Hello ${name},

Humari company *STAFKIND SERVICES* ke baare mein adhik jaankari aur uplabdha Work-From-Home opportunities ko samajhne ke liye niche diye gaye link par click karein:

🔗 Info Link: ${link}

Is page par aapko hamari services, salary details aur HR se judne ka direct tarika mil jayega. Kripya ise dhyaan se padhein.

Best Regards,
HR ${hr}
*STAFKIND SERVICES*`;
    }
    else {
        return `Subject: Update from STAFKIND SERVICES

Dear ${name},

Humne aapko Telecaller position ke liye shortlist kiya tha. Referral aur offers ke liye niche diye link par click karein.

Registration Link: ${link}

Best Regards,
HR ${hr}
STAFKIND SERVICES`;
    }
}

function updatePreview() {
    document.getElementById('msgPreview').innerText = generateMessage();
}

function copyToClipboard() {
    const text = generateMessage();
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
        document.execCommand('copy');
        alert("Message copied to clipboard!");
    } catch (err) {
        alert("Unable to copy");
    }
    document.body.removeChild(textArea);
}

function sendWhatsApp() {
    const phone = document.getElementById('custPhone').value;
    if(!phone || phone.length < 10) { 
        alert("Kripya sahi WhatsApp number dalein!"); 
        return; 
    }
    const message = generateMessage();
    const waLink = `https://wa.me/91${phone}?text=${encodeURIComponent(message)}`;
    window.open(waLink, '_blank');
}

updateContent();
</script>

</body>
</html>
